name: Feature request
description: Suggest something new
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are welcome. Before opening one, search existing issues to see if it's already been discussed.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow or situation that prompted this request. "I want X" is less useful than "when I do Y, I have to Z which is painful because…"
      placeholder: "When managing a large library, I have to manually..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would the feature look like? UI mockup, API shape, config option — whatever helps communicate the idea.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Other ways to solve the problem, including workarounds you're currently using.

  - type: dropdown
    id: migration
    attributes:
      label: Is this a Radarr feature you're missing?
      description: Helps us prioritise migration-path parity.
      options:
        - "Yes — Radarr has this"
        - "No — it's a new idea"
        - "Not sure"
